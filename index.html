<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121214">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>TaskFlow Pro | Enterprise</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <style>
        :root {
            /* Design System - Enterprise Dark Theme Default */
            --bg-base: #121214;
            --bg-surface: #202024;
            --bg-surface-hover: #29292e;
            --border-color: #323238;
            
            --text-title: #e1e1e6;
            --text-base: #c4c4cc;
            --text-support: #8d8d99;
            
            --brand-primary: #F5A623;
            --brand-secondary: #F8E3A1;
            --brand-gradient: linear-gradient(135deg, #F5A623 0%, #D48806 100%);
            
            --danger: #F75A68;
            --success: #00B37E;
            --warning: #FBA94C;
            
            --radius-md: 8px;
            --radius-lg: 16px;
            --radius-pill: 999px;
            
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
            
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            --bg-base: #F8F9FA;
            --bg-surface: #FFFFFF;
            --bg-surface-hover: #F1F3F5;
            --border-color: #E9ECEF;
            --text-title: #212529;
            --text-base: #495057;
            --text-support: #868E96;
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-base); color: var(--text-base); min-height: 100vh; display: flex; overflow: hidden; }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        
        /* Layout Grid */
        .app-container { display: grid; grid-template-columns: 240px 1fr; width: 100vw; height: 100vh; }

        /* Sidebar */
        .sidebar { background-color: var(--bg-surface); border-right: 1px solid var(--border-color); padding: 1.5rem; display: flex; flex-direction: column; gap: 2rem; z-index: 10; }
        .brand { display: flex; align-items: center; gap: 0.75rem; color: var(--text-title); font-weight: 800; font-size: 1.25rem; }
        .brand i { color: var(--brand-primary); font-size: 1.5rem; }
        
        .nav-menu { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: var(--radius-md); color: var(--text-support); text-decoration: none; font-weight: 500; cursor: pointer; transition: var(--transition); border: none; background: transparent; width: 100%; text-align: left; font-size: 0.95rem; }
        .nav-item:hover { background-color: var(--bg-surface-hover); color: var(--text-title); }
        .nav-item.active { background-color: rgba(245, 166, 35, 0.1); color: var(--brand-primary); }
        .nav-item i { font-size: 1.25rem; }

        /* Main Content */
        .main-content { padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 2rem; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .search-bar { background: var(--bg-surface); border: 1px solid var(--border-color); padding: 0.75rem 1rem; border-radius: var(--radius-md); display: flex; align-items: center; gap: 0.5rem; flex: 1; max-width: 400px; transition: var(--transition); }
        .search-bar:focus-within { border-color: var(--brand-primary); box-shadow: 0 0 0 2px rgba(245, 166, 35, 0.2); }
        .search-bar input { background: transparent; border: none; outline: none; color: var(--text-title); width: 100%; font-size: 0.95rem; }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .icon-btn { background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-title); width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .icon-btn:hover { background: var(--bg-surface-hover); }

        /* Dashboard KPIs */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
        .metric-card { background: var(--bg-surface); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: var(--radius-lg); display: flex; flex-direction: column; gap: 0.5rem; }
        .metric-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-support); font-size: 0.875rem; font-weight: 600; text-transform: uppercase; }
        .metric-value { font-size: 2rem; font-weight: 800; color: var(--text-title); }
        .metric-icon { padding: 0.5rem; border-radius: var(--radius-md); font-size: 1.25rem; }
        .metric-card:nth-child(1) .metric-icon { background: rgba(0, 179, 126, 0.1); color: var(--success); }
        .metric-card:nth-child(2) .metric-icon { background: rgba(245, 166, 35, 0.1); color: var(--warning); }
        .metric-card:nth-child(3) .metric-icon { background: rgba(247, 90, 104, 0.1); color: var(--danger); }

        /* Toolbar & Controls */
        .board-controls { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
        .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-select { background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-title); padding: 0.5rem 1rem; border-radius: var(--radius-md); outline: none; font-size: 0.875rem; cursor: pointer; }
        .btn-primary { background: var(--brand-gradient); color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: var(--transition); box-shadow: var(--shadow-sm); }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* Task List */
        .task-list { display: flex; flex-direction: column; gap: 0.75rem; padding-bottom: 2rem; }
        .task-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.25rem; display: flex; gap: 1rem; transition: var(--transition); position: relative; overflow: hidden; }
        .task-card:hover { border-color: var(--text-support); }
        .task-card.sortable-ghost { opacity: 0.3; }
        
        /* Prioridades Refinadas */
        .priority-indicator { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .task-card[data-priority="high"] .priority-indicator { background: var(--danger); }
        .task-card[data-priority="medium"] .priority-indicator { background: var(--warning); }
        .task-card[data-priority="low"] .priority-indicator { background: var(--success); }

        .task-checkbox { display: flex; align-items: flex-start; padding-top: 0.25rem; }
        .custom-cb { appearance: none; width: 1.25rem; height: 1.25rem; border: 2px solid var(--text-support); border-radius: 4px; cursor: pointer; position: relative; transition: var(--transition); flex-shrink: 0; }
        .custom-cb:checked { background: var(--brand-primary); border-color: var(--brand-primary); }
        .custom-cb:checked::after { content: '✓'; position: absolute; color: #121214; font-size: 0.9rem; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .task-card.completed { opacity: 0.6; }
        .task-card.completed .task-title { text-decoration: line-through; color: var(--text-support); }

        .task-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.5rem; }
        .task-title { font-size: 1.05rem; font-weight: 600; color: var(--text-title); word-break: break-word; }
        .task-desc { font-size: 0.875rem; color: var(--text-support); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .task-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.25rem; }
        .badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.5rem; background: var(--bg-base); border: 1px solid var(--border-color); border-radius: 4px; font-size: 0.75rem; font-weight: 500; color: var(--text-support); }
        
        /* Subtasks Progress */
        .subtask-progress { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: var(--text-support); margin-top: 0.5rem; }
        .progress-track { flex: 1; height: 4px; background: var(--bg-base); border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--brand-primary); transition: width 0.3s ease; }

        .task-actions { display: flex; gap: 0.25rem; align-items: flex-start; }
        .action-btn { background: transparent; border: none; color: var(--text-support); padding: 0.5rem; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); font-size: 1.25rem; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { background: var(--bg-base); color: var(--text-title); }
        .action-btn.del:hover { color: var(--danger); }
        
        .drag-handle { cursor: grab; color: var(--text-support); padding: 0.5rem; display: flex; align-items: center; font-size: 1.25rem; }

        /* Modal Nativo Refinado */
        dialog { margin: auto; padding: 0; border: none; border-radius: var(--radius-lg); background: var(--bg-surface); color: var(--text-base); box-shadow: var(--shadow-lg); max-width: 500px; width: 90%; }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .modal-content { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; }
        .modal-title { font-size: 1.25rem; font-weight: 700; color: var(--text-title); }
        
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.875rem; font-weight: 600; color: var(--text-title); }
        .form-control { background: var(--bg-base); border: 1px solid var(--border-color); color: var(--text-title); padding: 0.75rem; border-radius: var(--radius-md); font-size: 0.95rem; outline: none; transition: var(--transition); }
        .form-control:focus { border-color: var(--brand-primary); }
        textarea.form-control { resize: vertical; min-height: 80px; }

        /* Subtasks Form */
        .subtask-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
        .subtask-item { display: flex; gap: 0.5rem; }
        .subtask-item input { flex: 1; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem; }
        .btn-ghost { background: transparent; border: none; color: var(--text-support); font-weight: 600; cursor: pointer; padding: 0.75rem 1.5rem; }

        /* Toast */
        #toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-title); padding: 1rem 1.5rem; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 0.75rem; font-weight: 500; transform: translateY(150%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        #toast.show { transform: translateY(0); }
        #toast.error { border-left: 4px solid var(--danger); }
        #toast.success { border-left: 4px solid var(--success); }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
            .sidebar { grid-row: 2; flex-direction: row; padding: 0.5rem 1rem; border-right: none; border-top: 1px solid var(--border-color); justify-content: space-around; padding-bottom: env(safe-area-inset-bottom, 1rem); }
            .brand { display: none; }
            .nav-menu { flex-direction: row; justify-content: space-around; width: 100%; }
            .nav-item { flex-direction: column; gap: 0.25rem; padding: 0.5rem; font-size: 0.7rem; text-align: center; width: auto; }
            .nav-item i { font-size: 1.5rem; }
            .main-content { padding: 1rem; }
            .metrics-grid { grid-template-columns: 1fr; }
            .board-controls { flex-direction: column; align-items: stretch; }
            .filters { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 0.5rem; }
            .filter-select { flex-shrink: 0; }
            .task-card { padding: 1rem; gap: 0.75rem; }
            .task-actions { flex-direction: column; }
            .drag-handle { position: absolute; right: 0.5rem; top: 0.5rem; padding: 0.25rem; }
            #toast { left: 1rem; right: 1rem; bottom: calc(80px + env(safe-area-inset-bottom, 1rem)); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="brand">
            <i class="ph-fill ph-kanban"></i>
            TaskFlow Pro
        </div>
        <nav class="nav-menu">
            <button class="nav-item active" data-view="board">
                <i class="ph ph-squares-four"></i> Board
            </button>
            <button class="nav-item" id="exportBtn">
                <i class="ph ph-export"></i> Backup
            </button>
            <label class="nav-item" style="cursor: pointer;">
                <i class="ph ph-download-simple"></i> Restaurar
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </label>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="search-bar">
                <i class="ph ph-magnifying-glass" style="color: var(--text-support);"></i>
                <input type="text" id="searchInput" placeholder="Buscar tarefas, descrições ou categorias...">
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggle" title="Alternar Tema">
                    <i class="ph ph-moon"></i>
                </button>
                <button class="icon-btn" id="clearCompletedBtn" title="Limpar Concluídas">
                    <i class="ph ph-trash"></i>
                </button>
            </div>
        </header>

        <section class="metrics-grid">
            <div class="metric-card">
                <div class="metric-header">
                    <span>Taxa de Conclusão</span>
                    <i class="ph-fill ph-check-circle metric-icon"></i>
                </div>
                <div class="metric-value" id="kpi-completion">0%</div>
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <span>Pendentes</span>
                    <i class="ph-fill ph-hourglass-high metric-icon"></i>
                </div>
                <div class="metric-value" id="kpi-pending">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <span>Prioridade Alta</span>
                    <i class="ph-fill ph-warning metric-icon"></i>
                </div>
                <div class="metric-value" id="kpi-high">0</div>
            </div>
        </section>

        <section class="board-container">
            <div class="board-controls">
                <div class="filters">
                    <select id="filterStatus" class="filter-select">
                        <option value="all">Todas as Situações</option>
                        <option value="pending">Apenas Pendentes</option>
                        <option value="completed">Apenas Concluídas</option>
                    </select>
                    <select id="filterCategory" class="filter-select">
                        <option value="all">Todas as Categorias</option>
                        <option value="Backend">Backend</option>
                        <option value="Frontend">Frontend</option>
                        <option value="DevOps">DevOps</option>
                        <option value="Estudos">Estudos</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                    <select id="sortSelect" class="filter-select">
                        <option value="manual">Ordenação Manual</option>
                        <option value="date">Data Limite</option>
                        <option value="priority">Prioridade</option>
                    </select>
                </div>
                <button class="btn-primary" id="openModalBtn">
                    <i class="ph-bold ph-plus"></i> Nova Tarefa
                </button>
            </div>
            
            <div style="margin-top: 1.5rem;" id="taskList" class="task-list">
                </div>
        </section>
    </main>
</div>

<dialog id="taskModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="modalTitle">Criar Nova Tarefa</h2>
            <button class="icon-btn cancel-modal" style="border:none; width:32px; height:32px;"><i class="ph ph-x"></i></button>
        </div>
        <form id="taskForm">
            <div class="form-group">
                <label>Título da Tarefa *</label>
                <input type="text" id="taskTitle" class="form-control" required placeholder="Ex: Refatorar API REST...">
            </div>
            <div class="form-group">
                <label>Descrição Opcional</label>
                <textarea id="taskDesc" class="form-control" placeholder="Detalhes técnicos, links, etc..."></textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Prioridade</label>
                    <select id="taskPriority" class="form-control">
                        <option value="low">Baixa</option>
                        <option value="medium" selected>Média</option>
                        <option value="high">Alta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="taskCategory" class="form-control">
                        <option value="Backend">Backend</option>
                        <option value="Frontend">Frontend</option>
                        <option value="DevOps">DevOps</option>
                        <option value="Estudos">Estudos</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Data Limite</label>
                <input type="date" id="taskDate" class="form-control" required>
            </div>

            <div class="form-group" style="margin-top: 0.5rem; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Checklist (Subtarefas)</label>
                    <button type="button" id="addSubtaskBtn" class="btn-ghost" style="padding: 0.25rem 0.5rem; font-size: 0.8rem; border: 1px solid var(--border-color); border-radius: 4px;"><i class="ph ph-plus"></i> Item</button>
                </div>
                <div id="subtaskList" class="subtask-list"></div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-ghost cancel-modal">Cancelar</button>
                <button type="submit" class="btn-primary">Salvar Tarefa</button>
            </div>
        </form>
    </div>
</dialog>

<div id="toast">
    <i class="ph-fill ph-info"></i>
    <span id="toastMsg">Mensagem</span>
</div>

<script>
/**
 * Arquitetura Orientada a Objetos para gestão de estado e UI.
 * Padrão ideal para aplicações complexas (SaaS).
 */
class TaskApp {
    constructor() {
        this.tasks = [];
        this.editingId = null;
        this.sortable = null;
        
        // Elementos DOM principais
        this.listEl = document.getElementById('taskList');
        this.modal = document.getElementById('taskModal');
        this.form = document.getElementById('taskForm');
        
        this.init();
    }

    init() {
        this.loadData();
        this.bindEvents();
        this.initTheme();
        this.initSortable();
        this.render();
    }

    // --- STATE MANAGEMENT ---
    loadData() {
        const data = localStorage.getItem('taskflow_enterprise');
        if (data) {
            this.tasks = JSON.parse(data);
        } else {
            // Mock de dados iniciais para demonstração
            this.tasks = [{
                id: Date.now(),
                title: "Configurar Servidor de Produção",
                description: "Fazer setup do Nginx e certificado SSL na VPS.",
                priority: "high",
                category: "DevOps",
                date: new Date().toISOString().slice(0,10),
                completed: false,
                subtasks: [
                    { id: 1, text: "Instalar Nginx", done: true },
                    { id: 2, text: "Gerar Certbot", done: false }
                ]
            }];
        }
    }

    saveData() {
        localStorage.setItem('taskflow_enterprise', JSON.stringify(this.tasks));
        this.updateDashboard();
    }

    // --- CORE LOGIC ---
    addTask(taskData) {
        this.tasks.unshift({ ...taskData, id: Date.now(), completed: false });
        this.saveData();
        this.showToast('Tarefa criada com sucesso!', 'success');
    }

    updateTask(id, taskData) {
        const idx = this.tasks.findIndex(t => t.id === id);
        if (idx > -1) {
            this.tasks[idx] = { ...this.tasks[idx], ...taskData };
            this.saveData();
            this.showToast('Tarefa atualizada!', 'success');
        }
    }

    deleteTask(id) {
        this.tasks = this.tasks.filter(t => t.id !== id);
        this.saveData();
        this.showToast('Tarefa removida.');
    }

    toggleComplete(id) {
        this.vibrate(50);
        const task = this.tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            this.saveData();
            this.render();
        }
    }

    toggleSubtask(taskId, subtaskId) {
        const task = this.tasks.find(t => t.id === taskId);
        if (task && task.subtasks) {
            const sub = task.subtasks.find(s => s.id === subtaskId);
            if (sub) sub.done = !sub.done;
            this.saveData();
            this.render();
        }
    }

    // --- UI & RENDER ---
    getProcessedTasks() {
        let result = [...this.tasks];
        
        // Filtros
        const status = document.getElementById('filterStatus').value;
        const category = document.getElementById('filterCategory').value;
        const search = document.getElementById('searchInput').value.toLowerCase().trim();

        if (status === 'pending') result = result.filter(t => !t.completed);
        if (status === 'completed') result = result.filter(t => t.completed);
        if (category !== 'all') result = result.filter(t => t.category === category);
        
        // Busca
        if (search) {
            result = result.filter(t => 
                t.title.toLowerCase().includes(search) || 
                (t.description && t.description.toLowerCase().includes(search)) ||
                t.category.toLowerCase().includes(search)
            );
        }

        // Ordenação
        const sort = document.getElementById('sortSelect').value;
        if (sort === 'date') result.sort((a, b) => a.date.localeCompare(b.date));
        if (sort === 'priority') {
            const weights = { high: 1, medium: 2, low: 3 };
            result.sort((a, b) => weights[a.priority] - weights[b.priority]);
        }
        
        // Controle do Drag and Drop
        const canDrag = sort === 'manual' && status === 'all' && category === 'all' && !search;
        if (this.sortable) this.sortable.option('disabled', !canDrag);

        return { result, canDrag };
    }

    render() {
        const { result, canDrag } = this.getProcessedTasks();
        this.listEl.innerHTML = '';

        if (result.length === 0) {
            this.listEl.innerHTML = `
                <div style="text-align: center; padding: 3rem 1rem; color: var(--text-support);">
                    <i class="ph ph-folder-open" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                    <p>Nenhuma tarefa encontrada. Aproveite o tempo livre!</p>
                </div>`;
        } else {
            result.forEach(task => this.listEl.appendChild(this.createTaskElement(task, canDrag)));
        }
        
        this.updateDashboard();
    }

    createTaskElement(task, canDrag) {
        const div = document.createElement('div');
        div.className = `task-card ${task.completed ? 'completed' : ''}`;
        div.dataset.id = task.id;
        div.dataset.priority = task.priority;

        const dateStr = task.date.split('-').reverse().join('/');
        
        // Lógica da barra de subtarefas
        let subtaskHTML = '';
        if (task.subtasks && task.subtasks.length > 0) {
            const total = task.subtasks.length;
            const done = task.subtasks.filter(s => s.done).length;
            const pct = Math.round((done / total) * 100);
            
            subtaskHTML = `
                <div class="subtask-progress">
                    <i class="ph ph-list-checks"></i> ${done}/${total}
                    <div class="progress-track">
                        <div class="progress-bar" style="width: ${pct}%"></div>
                    </div>
                </div>
            `;
        }

        div.innerHTML = `
            <div class="priority-indicator"></div>
            <div class="drag-handle" style="opacity: ${canDrag ? '1' : '0.2'}"><i class="ph ph-dots-six-vertical"></i></div>
            
            <div class="task-checkbox">
                <input type="checkbox" class="custom-cb trigger-complete" data-id="${task.id}" ${task.completed ? 'checked' : ''}>
            </div>
            
            <div class="task-content">
                <div class="task-title">${this.escapeHTML(task.title)}</div>
                ${task.description ? `<div class="task-desc">${this.escapeHTML(task.description)}</div>` : ''}
                
                ${subtaskHTML}
                
                <div class="task-meta">
                    <span class="badge"><i class="ph ph-tag"></i> ${task.category}</span>
                    <span class="badge"><i class="ph ph-calendar-blank"></i> ${dateStr}</span>
                </div>
                
                ${task.subtasks && task.subtasks.length > 0 && !task.completed ? `
                    <div style="margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.25rem;">
                        ${task.subtasks.map(sub => `
                            <label style="display: flex; gap: 0.5rem; align-items: center; font-size: 0.8rem; color: var(--text-support); cursor: pointer;">
                                <input type="checkbox" class="trigger-subtask" data-task="${task.id}" data-sub="${sub.id}" ${sub.done ? 'checked' : ''}>
                                <span style="${sub.done ? 'text-decoration: line-through; opacity: 0.7;' : ''}">${this.escapeHTML(sub.text)}</span>
                            </label>
                        `).join('')}
                    </div>
                ` : ''}
            </div>
            
            <div class="task-actions">
                <button class="action-btn edit-btn" data-id="${task.id}" title="Editar"><i class="ph ph-pencil-simple"></i></button>
                <button class="action-btn del-btn" data-id="${task.id}" title="Excluir"><i class="ph ph-trash"></i></button>
            </div>
        `;
        return div;
    }

    updateDashboard() {
        const total = this.tasks.length;
        const comp = this.tasks.filter(t => t.completed).length;
        const pend = total - comp;
        const high = this.tasks.filter(t => !t.completed && t.priority === 'high').length;
        
        const rate = total === 0 ? 0 : Math.round((comp / total) * 100);
        
        document.getElementById('kpi-completion').innerText = `${rate}%`;
        document.getElementById('kpi-pending').innerText = pend;
        document.getElementById('kpi-high').innerText = high;
    }

    // --- MODAL & FORM ---
    openModal(taskId = null) {
        this.editingId = taskId;
        const subList = document.getElementById('subtaskList');
        subList.innerHTML = '';
        
        if (taskId) {
            const t = this.tasks.find(x => x.id === taskId);
            document.getElementById('modalTitle').innerText = 'Editar Tarefa';
            document.getElementById('taskTitle').value = t.title;
            document.getElementById('taskDesc').value = t.description || '';
            document.getElementById('taskPriority').value = t.priority;
            document.getElementById('taskCategory').value = t.category;
            document.getElementById('taskDate').value = t.date;
            
            if (t.subtasks) {
                t.subtasks.forEach(sub => this.addSubtaskInput(sub.text));
            }
        } else {
            document.getElementById('modalTitle').innerText = 'Nova Tarefa';
            this.form.reset();
            document.getElementById('taskDate').value = new Date().toISOString().slice(0,10);
            document.getElementById('taskPriority').value = 'medium';
        }
        
        this.modal.showModal();
    }

    closeModal() {
        this.modal.close();
        this.form.reset();
        this.editingId = null;
    }

    addSubtaskInput(val = '') {
        const div = document.createElement('div');
        div.className = 'subtask-item';
        div.innerHTML = `
            <input type="text" class="form-control sub-input" placeholder="Novo item..." value="${this.escapeHTML(val)}" required>
            <button type="button" class="icon-btn del-sub" style="color: var(--danger);"><i class="ph ph-trash"></i></button>
        `;
        div.querySelector('.del-sub').onclick = () => div.remove();
        document.getElementById('subtaskList').appendChild(div);
        if(!val) div.querySelector('input').focus();
    }

    handleFormSubmit(e) {
        e.preventDefault();
        
        // Coletar subtarefas
        const subtasks = Array.from(document.querySelectorAll('.sub-input')).map((input, idx) => ({
            id: idx + 1,
            text: input.value.trim(),
            done: false // No edit, a lógica de manter o done precisaria ser mais complexa, simplificando aqui
        }));

        const payload = {
            title: document.getElementById('taskTitle').value.trim(),
            description: document.getElementById('taskDesc').value.trim(),
            priority: document.getElementById('taskPriority').value,
            category: document.getElementById('taskCategory').value,
            date: document.getElementById('taskDate').value,
            subtasks: subtasks
        };

        if (this.editingId) {
            // Preservar estado 'done' das subtarefas se editado
            const oldTask = this.tasks.find(t => t.id === this.editingId);
            payload.subtasks.forEach(newSub => {
                const oldSub = (oldTask.subtasks || []).find(os => os.text === newSub.text);
                if (oldSub) newSub.done = oldSub.done;
            });
            this.updateTask(this.editingId, payload);
        } else {
            this.addTask(payload);
        }

        this.closeModal();
        this.render();
    }

    // --- UTILS & EVENTS ---
    bindEvents() {
        // Event Delegation para Lista de Tarefas (Alta Performance)
        this.listEl.addEventListener('click', e => {
            const btnEdit = e.target.closest('.edit-btn');
            const btnDel = e.target.closest('.del-btn');
            
            if (btnEdit) this.openModal(Number(btnEdit.dataset.id));
            if (btnDel && confirm('Tem certeza que deseja excluir?')) {
                this.vibrate(80);
                this.deleteTask(Number(btnDel.dataset.id));
                this.render();
            }
        });

        this.listEl.addEventListener('change', e => {
            if (e.target.classList.contains('trigger-complete')) {
                this.toggleComplete(Number(e.target.dataset.id));
            }
            if (e.target.classList.contains('trigger-subtask')) {
                this.toggleSubtask(Number(e.target.dataset.task), Number(e.target.dataset.sub));
            }
        });

        // Controles Superiores
        document.getElementById('openModalBtn').onclick = () => this.openModal();
        document.querySelectorAll('.cancel-modal').forEach(b => b.onclick = () => this.closeModal());
        document.getElementById('addSubtaskBtn').onclick = () => this.addSubtaskInput();
        this.form.onsubmit = e => this.handleFormSubmit(e);
        
        // Filtros em Tempo Real
        ['filterStatus', 'filterCategory', 'sortSelect'].forEach(id => {
            document.getElementById(id).onchange = () => this.render();
        });
        
        // Busca com Debounce manual simples
        let timer;
        document.getElementById('searchInput').oninput = () => {
            clearTimeout(timer);
            timer = setTimeout(() => this.render(), 300);
        };

        // Ações Globais
        document.getElementById('clearCompletedBtn').onclick = () => {
            const len = this.tasks.length;
            this.tasks = this.tasks.filter(t => !t.completed);
            if(this.tasks.length !== len) {
                this.saveData(); this.render(); this.showToast('Tarefas limpas.');
            }
        };

        document.getElementById('exportBtn').onclick = () => {
            const blob = new Blob([JSON.stringify(this.tasks, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `taskflow_enterprise_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        };

        document.getElementById('importFile').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try { 
                    const imported = JSON.parse(ev.target.result); 
                    if(Array.isArray(imported)) { this.tasks = imported; this.saveData(); this.render(); this.showToast('Backup restaurado!', 'success'); } 
                } catch(err) { this.showToast('Erro ao ler arquivo.', 'error'); }
            };
            reader.readAsText(file);
            e.target.value = '';
        };
    }

    initTheme() {
        const toggleBtn = document.getElementById('themeToggle');
        const isLight = localStorage.getItem('taskflow_theme') === 'light';
        
        const applyTheme = (light) => {
            if (light) {
                document.body.classList.add('light-theme');
                toggleBtn.innerHTML = '<i class="ph ph-sun"></i>';
                document.querySelector('meta[name="theme-color"]').content = "#F8F9FA";
            } else {
                document.body.classList.remove('light-theme');
                toggleBtn.innerHTML = '<i class="ph ph-moon"></i>';
                document.querySelector('meta[name="theme-color"]').content = "#121214";
            }
        };

        applyTheme(isLight);

        toggleBtn.onclick = () => {
            const willBeLight = !document.body.classList.contains('light-theme');
            localStorage.setItem('taskflow_theme', willBeLight ? 'light' : 'dark');
            applyTheme(willBeLight);
        };
    }

    initSortable() {
        this.sortable = new Sortable(this.listEl, {
            animation: 250,
            handle: '.drag-handle',
            ghostClass: 'sortable-ghost',
            onEnd: (evt) => {
                this.vibrate(40);
                const item = this.tasks.splice(evt.oldIndex, 1)[0];
                this.tasks.splice(evt.newIndex, 0, item);
                this.saveData();
            }
        });
    }

    vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
    
    escapeHTML(str) { 
        return str ? str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])) : ''; 
    }

    showToast(msg, type = 'default') {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        t.className = type;
        t.querySelector('i').className = type === 'error' ? 'ph-fill ph-warning-circle' : 'ph-fill ph-check-circle';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
}

// Inicializar aplicação
document.addEventListener('DOMContentLoaded', () => {
    window.App = new TaskApp();
});
</script>
</body>
